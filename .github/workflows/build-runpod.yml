name: Build Runpod image

# Builds Dockerfile.runpod and pushes it to GHCR so Runpod Serverless can pull it.
# The image bakes in ~19 GB of model weights (~30 GB total), so it aggressively
# frees runner disk first — a free runner only has ~14 GB free out of the box.

on:
  push:
    branches: [main, dev]
    paths:
      - "Dockerfile.runpod"
      - "runpod_handler.py"
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/build-runpod.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # A 30 GB image needs far more than the ~14 GB free on a stock runner.
      # This action reliably frees ~30 GB (removes preinstalled Android SDK,
      # .NET, GHC, CodeQL, big toolchains, etc.).
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - name: Show free disk
        run: df -h /

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      # HY-Motion keeps its SMPL body-model binaries in Git LFS. Without pulling
      # them, the submodule has only pointer text files, which crash at model
      # load ("buffer size must be a multiple of element size"). Pull them so the
      # Docker COPY bakes the real binaries into the image.
      - name: Pull Git LFS for the HY-Motion submodule
        run: |
          git lfs install
          git -C vendor/HY-Motion-1.0 lfs pull
          echo "== LFS files pulled =="
          git -C vendor/HY-Motion-1.0 lfs ls-files | head -20

      # GHCR requires a lowercase repository name; the owner may have capitals.
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/hymotion-runpod" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runpod
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
